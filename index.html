
<!DOCTYPE html>

  <title>Plan Approval Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }
      
      
      /*  Keep existing layout - removed forced reflow rules */

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
        width: 100% !important;
        position: relative !important;
      }

      body {
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Respect existing page layout from Reports component */
      .break-after-page {
        page-break-after: always !important;
        break-after: page !important;
      }

      /* Tables should behave well within pages */
      table {
        page-break-inside: auto;
        width: 100% !important;
        border-collapse: collapse !important;
      }

      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }

      thead {
        display: table-header-group;
      }


    }

    /* Screen-only visual improvements for Intelligence pages */
    .print-only {
      display: none;
    }

    /* Scrollbar behavior for screen */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
  </style>
